name: Deploy Back Stab to GitHub Pages

# Publishes the game to https://<owner>.github.io/Backstab-Game/
# on every push to main. Also runnable manually from the Actions tab.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions the deploy needs
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Turns Pages on automatically (no manual settings needed)
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Upload the whole site (index.html + css/ + js/) from the repo root
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
